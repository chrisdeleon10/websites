<div class="vehicle-unit-container new-{{is_new}}" data-locked-inventory="false">
  
    <div class="vehicle-thumb">{{{srp_thumb}}}</div>
    
    <div class="vehicle-content">
      <div class="row">
        <div class="col-xs-12">
          <div class="text-center window-sticker">{{{window_sticker_link}}}</div>
          
          <div class="vehicle-title">
            <a href="{{link_to_vehicle}}" target="_blank" class="vehicle-link">
                <h4>{{vehicle_display_title}}</h4>
            </a>
          </div>
          <div class="text-center stock-number">
              <h5>Stock #{{stock_number}}</h5>
          </div>
          <div class="text-center">{{{vehicle_transfer_notice}}}</div>
        
      <div class="vehicle-price">{{{price_block}}}</div>
  
    <div class="index-btns center-block">
      {{{index_button_0}}} {{{index_button_1}}}
      {{{index_button_2}}} {{{index_button_3}}}
      {{{index_button_4}}} {{{incentives}}}
    </div>
    
    <div class="vehicle-badges">{{{vehicle_badges}}}</div>
        
      </div>
    </div>
  </div>
  </div>
