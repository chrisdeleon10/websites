<div class="vehicle-unit-container new-{{is_new}}">
    <div class="vehicle-thumb">{{{srp_thumb}}}</div>
    <div class="vehicle-content">
        <div class="row row-no-gutters active-template-vehicle-title-block">
            <div class="col-xs-12">
                <a href="{{link_to_vehicle}}" class="vehicle-link">
                    <div class="vehicle-title">
                        <p class="vehicle-year">{{year}} {{make}}</p>
                        <p class="vehicle-make-model">
                            <span class="model">{{model}}</span>
                        </p>
                    </div>
                    <div class="vehicle-sub-title">
                        <p>
                            <span class="vehicle-trim">{{trim}}</span> | <span class="vehicle-mileage">{{mileage_delimited}} mi</span>
                        </p>
                    </div>
                </a>
            </div>
            <div class="row row-no-gutters active-template-price-block">
                <div class="col-xs-12">
                    <div class="active-template-price-block">
                        {{{price_block}}}
                    </div>
                </div>
            </div>
          
        </div>

        <div class="row row-no-gutters active-template-price-block">
        </div>
        <div class="add-incentives">{{{incentives}}}</div>
        <div class="row row-no-gutters vehicle-index-buttons vehicle-buttons">
            <div class="col-xs-12">
                {{{index_button_0}}}{{{index_button_1}}}{{{index_button_2}}}
            </div>
          <a href="https://capnissan.fuseautotech.com/?identifier={VIN}&amp;dealership=1397&amp;url={CURRENT_URL}&amp;groupName=littleapplecars" target="_blank" class="hidden" id="explore-payment-options">
  <div class="btn search-button search-button--explore">Explore Payment Options</div>
</a>
        </div>
        <div class="row row-no-gutters active-template-vehicle-badges">{{{vehicle_badges}}}</div>
        <div class="row row-no-gutters active-template-compare-vehicle-widget">{{{compare_vehicle}}}</div>
    </div>
  </div>
